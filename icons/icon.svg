<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e2a14"/>
      <stop offset="100%" stop-color="#111709"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- Chess rook (castle) shape in gold -->
  <!-- Battlements (3 merlons) -->
  <rect x="144" y="104" width="62" height="72" rx="6" fill="#c4a030"/>
  <rect x="225" y="104" width="62" height="72" rx="6" fill="#c4a030"/>
  <rect x="306" y="104" width="62" height="72" rx="6" fill="#c4a030"/>

  <!-- Parapet bar connecting battlements -->
  <rect x="144" y="166" width="224" height="28" fill="#c4a030"/>

  <!-- Main body -->
  <rect x="166" y="194" width="180" height="162" fill="#c4a030"/>

  <!-- Body window detail -->
  <rect x="204" y="230" width="104" height="90" rx="4" fill="#111709" opacity="0.35"/>

  <!-- Base (stepped) -->
  <rect x="128" y="356" width="256" height="44" rx="6" fill="#c4a030"/>
  <rect x="104" y="394" width="304" height="22" rx="8" fill="#c4a030"/>
